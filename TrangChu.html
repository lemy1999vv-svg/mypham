<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Mỹ Phẩm AgarWood - Hoàn thiện</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            width: 800px;
            margin: 0 auto;
            background-color: #4a001a;
            border: 1px solid #66001a;
        
        .header {
            position: relative; 
            height: 120px;
            background-color: #4a001a;
            overflow: hidden;
        }
        .banner-bg {
            position: absolute;
            right: 0;
            top: 0;
            height: 120px;
        }
        .logo-main {
            position: absolute;
            top: 5px;
            left: 5px;
            height: 110px; 
            z-index: 10;
        }
        .my-pham-text {
            position: absolute;
            top: 2px;
            left: 111px; 
            z-index: 10;
            height: 119px;
            width: 188px;
        }
        .nav-bar {
            background-color: #ff9900;
            padding: 7px 0;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            border-top: 1px solid #fff;
            border-bottom: 1px solid #fff;
            clear: both;
        }

            .nav-bar a {
                color: #fff;
                text-decoration: none;
                margin: 0 10px;
            }
        .main-table {
            width: 100%;
            border-collapse: collapse;
        }

        .sidebar {
            width: 200px;
            vertical-align: top;
            padding: 20px 10px;
            background-color: #5a0020;
        }

        .menu-v {
            list-style: none;
            padding: 0;
            margin: 0;
        }

            .menu-v li {
                margin-bottom: 5px;
            }

            .menu-v img {
                width: 180px;
                display: block;
            }

        .form-box {
            text-align: center;
            margin-top: 25px;
            color: white;
            font-size: 13px;
        }

            .form-box input {
                width: 160px;
                margin-bottom: 8px;
                border: none;
                padding: 4px;
            }

        .btn-submit {
            background: linear-gradient(to bottom, #a03030, #601010);
            color: white;
            border: 1px solid #fff;
            padding: 4px 15px;
            cursor: pointer;
        }

        .main-content {
            padding: 30px;
            background-color: #4a001a;
            color: white;
            vertical-align: top;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">
            <div class="header">
                <div class="header">
                    <div class="header">
                        <img src="./logo.jpg" / class="logo-main" alt="Logo AgarWood"> <img src="./my_pham.gif" / alt="MYPHAM.com" width="184" class="my-pham-text"> <img src="./banner.gif" / class="banner-bg" alt="Banner">
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-bar">
            <a href="TrangChu.html">TRANG CHỦ</a> | <a href="gioithieu.html">GIỚI THIỆU</a> | <a href="sanpham.html">SẢN PHẨM</a> |
            <a href="#">HỎI ĐÁP</a> | <a href="#">TƯ VẤN</a> | <a href="#">GIỎ HÀNG</a> | <a href="#">LIÊN HỆ</a>
        </div>

        <table class="main-table">
            <tr>
                <td class="sidebar">
                    <ul class="menu-v">
                        <li><img src="./trang_diem.gif" /></li>
                        <li><img src="./duong_da.gif" /></li>
                        <li><img src="./nuoc_hoa.gif" /></li>
                        <li><img src="./duong_toc.gif" /></li>
                        <li><img src="./duong_the.gif" /></li>
                        <li><img src="./nam_gioi.gif" /></li>
                    </ul>

                    <img src="./tuongtrung.jpg" / width="180" style="margin-top: 20px;">

                    <div class="form-box">
                        <input type="text" placeholder="Tìm kiếm..."><br>
                        <button class="btn-submit">Tìm kiếm</button>

                        <div style="margin-top: 35px;">
                            Đăng nhập<br>
                            <input type="text"><br>
                            Mật khẩu<br>
                            <input type="password"><br>
                            <button class="btn-submit">Đăng nhập</button>
                        </div>
                    </div>
                </td>

                <td class="main-content">
                </td>
            </tr>
        </table>
    </div>

</body>
</html>



</body>
</html>
